services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fora_cmp
      POSTGRES_USER: fora
      POSTGRES_PASSWORD: fora
    ports:
      - "5432:5432"
    volumes:
      - fora-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  fora-postgres:
