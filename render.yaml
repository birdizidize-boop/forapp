services:
  - type: web
    name: fora-cmp-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn application:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fora-cmp-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: AUTO_CREATE_DB
        value: "true"
      - key: DEFAULT_TENANT_ID
        value: fora
      - key: PYTHON_VERSION
        value: 3.12.13

  - type: web
    name: fora-cmp-panel
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && VITE_API_URL=https://$RENDER_BACKEND_HOSTNAME/api pnpm build
    staticPublishPath: ./dist
    envVars:
      - key: RENDER_BACKEND_HOSTNAME
        fromService:
          type: web
          name: fora-cmp-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: fora-cmp-db
    region: frankfurt
    plan: free
    databaseName: fora_cmp
    user: fora_cmp
